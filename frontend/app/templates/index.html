<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Customer Audio</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #1f2937;
    }

    .card {
      width: min(420px, calc(100vw - 32px));
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    p {
      margin: 0 0 20px;
      color: #4b5563;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      background: white;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.95rem;
      display: none;
      white-space: pre-wrap;
    }

    .status.success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .status.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .hint {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #6b7280;
    }

    code {
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload Customer Audio</h1>
    <p>Select an audio file and enter the phone number that belongs to it.</p>

    <form id="uploadForm">
      <label for="phone">Phone number</label>
      <input id="phone" name="phone" type="tel" placeholder="e.g. +491701234567" required />

      <label for="audio">Audio file</label>
      <input id="audio" name="audio" type="file" accept="audio/*" required />

      <button type="submit" id="submitBtn">Upload</button>
    </form>

    <div id="status" class="status"></div>

    <div class="hint">
      Sends a <code>multipart/form-data</code> POST request to:<br />
      <code>http://localhost:5678/webhook-test/customer-contact/audio</code>
    </div>
  </div>

  <script>
    const form = document.getElementById('uploadForm');
    const statusBox = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    const webhookUrl = 'http://localhost:5678/webhook-test/customer-contact/audio';

    function setStatus(type, message) {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const phone = document.getElementById('phone').value.trim();
      const audioInput = document.getElementById('audio');
      const file = audioInput.files[0];

      if (!phone || !file) {
        setStatus('error', 'Please provide both a phone number and an audio file.');
        return;
      }

      const formData = new FormData();
      formData.append('phone', phone);
      formData.append('audio', file);

      submitBtn.disabled = true;
      setStatus('success', 'Uploading...');

      try {
        const response = await fetch(webhookUrl, {
          method: 'POST',
          body: formData,
        });

        const text = await response.text();

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${text || 'Upload failed'}`);
        }

        setStatus('success', `Upload successful.\n\nServer response:\n${text || '(empty response)'}`);
        form.reset();
      } catch (error) {
        setStatus('error', `Upload failed.\n\n${error.message}`);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
